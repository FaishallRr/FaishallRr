name: Generate Snake Animation

on:
  schedule:
    # Berjalan otomatis setiap 24 jam sekali
    - cron: "0 0 * * *" 
  
  # Mengizinkan Anda menjalankan workflow ini secara manual kapan saja
  workflow_dispatch:
  
  # Berjalan otomatis setiap kali Anda memperbarui README di branch main
  push:
    branches:
    - main
    
jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # --- PROSES CHECKOUT REPOSITORI ---
      - name: Checkout Repository
        uses: actions/checkout@v4

      # --- PROSES GENERATE KONTRIBUSI TEMA MERAH ---
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: FaishallRr
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ff0000
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_snake=#ff0000
            dist/pacman-contribution-graph.svg?palette=github-light&color_snake=#ff0000&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39

      # --- PUSH SEMUA HASIL KE BRANCH OUTPUT ---
      - name: Push to Output Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: output
          clean: true
