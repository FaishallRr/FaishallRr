name: Generate Snake Animation

on:
  schedule:
    # Berjalan otomatis setiap 24 jam sekali
    - cron: "0 0 * * *" 
  
  # Mengizinkan Anda menjalankan workflow ini secara manual kapan saja
  workflow_dispatch:
  
  # Berjalan otomatis setiap kali Anda memperbarui README di branch main
  push:
    branches:
    - main
    
jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Membuat animasi snake berdasarkan kontribusi akun FaishallRr
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: FaishallRr
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Melakukan push hasil animasi ke branch terpisah bernama 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
