name: Generate Snake and Pacman Animation

on:
  schedule:
    # Berjalan otomatis setiap 24 jam sekali
    - cron: "0 0 * * *" 
  
  # Mengizinkan Anda menjalankan workflow ini secara manual kapan saja
  workflow_dispatch:
  
  # Berjalan otomatis setiap kali Anda memperbarui README di branch main
  push:
    branches:
    - main
    
jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # --- PROSES GENERATE SNAKE ---
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: FaishallRr
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # --- PROSES GENERATE PACMAN (VERSI STABIL) ---
      - name: generate pacman-contribution-graph.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: FaishallRr
          outputs: |
            dist/pacman-contribution-graph.svg?palette=github-light&color_snake=#f3ca20&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_snake=#f3ca20

      # --- PUSH SEMUA HASIL KE BRANCH OUTPUT ---
      - name: push files to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
